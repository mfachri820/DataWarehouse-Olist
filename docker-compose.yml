version: '3.8'
services:
  db:
    image: postgres:15
    container_name: olist_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: olist_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  prisma-studio:
    image: node:18-alpine
    container_name: prisma_studio
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npx prisma studio"
    ports:
      - "5555:5555"
    depends_on:
      - db

volumes:
  postgres_data: